name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        # Override every GitHub-injected env var that triggers Vercel's
        # GitHub integration validation. Without these, vercel deploy
        # behaves as a plain CLI source-upload with no git-credential check.
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GITHUB_ACTIONS: ""
          GITHUB_TOKEN: ""
          GITHUB_REPOSITORY: ""
          GITHUB_REF: ""
          GITHUB_SHA: ""
          GITHUB_HEAD_REF: ""
          GITHUB_BASE_REF: ""
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
