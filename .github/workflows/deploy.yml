name: Deploy to Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Remove git remote so Vercel CLI does not inject GitHub metadata
        # Vercel CLI reads the git remote URL and auto-enables GitHub deployment
        # integration (githubDeployment=1), which then validates the team's
        # gitCredentialId. Removing origin prevents that check entirely.
        run: git remote remove origin

      - name: Deploy to Vercel (production)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
