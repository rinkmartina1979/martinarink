name: Deploy to Vercel

# DISABLED — Vercel deploys are handled natively by the GitHub integration
# webhook (Settings > Git > Connected Repository in Vercel dashboard).
# Running this CLI workflow simultaneously caused competing build attempts
# and queue collisions. The GitHub integration is the single deploy path.
#
# HOW PRODUCTION DEPLOYS WORK:
#   git push origin main  →  Vercel webhook fires  →  Vercel builds  →  live
#
# RE-ENABLE THIS ONLY IF:
#   - The GitHub integration is disconnected
#   - You are on a plan that requires CLI-based deploys
#   - You explicitly need a custom build pipeline
#
# To re-enable: change `branches: []` back to `branches: [main]`

on:
  push:
    branches: []   # ← empty = workflow never triggers

jobs:
  deploy-production:
    if: false   # ← double-guard: job never runs even if triggered
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Deploy to Vercel (production)
        # Source of truth: https://vercel.com/martina-rinks-projects/martinarink.com
        # Project ID: prj_ILo8RZxss4v5C16fjIDo5S4801FJ
        # Org ID: team_sIFjzIPHK3CVVX1Vj6Ei5gdK
        env:
          VERCEL_ORG_ID: team_sIFjzIPHK3CVVX1Vj6Ei5gdK
          VERCEL_PROJECT_ID: prj_ILo8RZxss4v5C16fjIDo5S4801FJ
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prod --yes --token=$VERCEL_TOKEN
